name: Monitor-Vino-Coto

on:
  schedule:
    # 11:00 UTC son las 08:00 AM en Argentina
    - cron: '0 11 * * *'
  workflow_dispatch: # Para que lo pruebes a mano cuando quieras

jobs:
  check-coto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Instalar Requests
        run: pip install requests
      - name: Correr Script Vino
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python vino.py
